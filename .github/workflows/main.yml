name: IPTV 直播源爬取

on:
  workflow_dispatch:
    inputs:
      max_links:
        description: '每频道最多几条 (0=不限)'
        required: false
        default: '3'

  # 每天北京时间 6:00 和 17:00
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京 6:00
    - cron: '0 9 * * *'   # UTC 09:00 = 北京 17:00

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: pip install requests beautifulsoup4

      - name: 爬取直播源
        env:
          MAX_LINKS: ${{ github.event.inputs.max_links || '3' }}
        run: |
          python3 main.py \
            -f demo.txt \
            -n "$MAX_LINKS" \
            -o output

      - name: 提交结果到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt output.m3u
          git diff --staged --quiet || git commit -m "update iptv sources $(date +%Y-%m-%d)"
          git push || true
